<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>8000VIP 服务</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #F0EAE4;
      min-height: 100dvh;
      color: #333;
      overscroll-behavior: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== VIP 卡片 ===== */
    .vip-card {
      position: relative;
      margin: 20px 16px 16px;
      background: linear-gradient(135deg, #3A3530 0%, #2A2522 100%);
      border-radius: 18px;
      padding: 24px 20px 28px;
      overflow: hidden;
    }
    .vip-card::after {
      content: '';
      position: absolute;
      top: -30px;
      right: -10px;
      width: 130px;
      height: 120px;
      background:
        linear-gradient(135deg, transparent 40%, rgba(212,168,76,0.15) 45%, rgba(212,168,76,0.25) 50%, rgba(232,201,126,0.15) 55%, transparent 60%);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    }
    .vip-card::before {
      content: '';
      position: absolute;
      top: -10px;
      right: 5px;
      width: 110px;
      height: 100px;
      background:
        linear-gradient(135deg, transparent 42%, rgba(255,235,180,0.08) 46%, rgba(212,168,76,0.12) 50%, rgba(255,235,180,0.06) 54%, transparent 58%);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    }
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,240,200,0.7);
      box-shadow: 0 0 8px 2px rgba(255,230,160,0.3);
      animation: twinkle 2s ease-in-out infinite;
    }
    .sp1 { top: 15px; right: 70px; animation-delay: 0s; }
    .sp2 { top: 45px; right: 95px; animation-delay: 0.7s; }
    .sp3 { top: 80px; right: 55px; animation-delay: 1.4s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .vip-name {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }
    .vip-title {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    /* ===== 专员卡片 ===== */
    .specialist-card {
      margin: 0 16px 16px;
      background: linear-gradient(180deg, #FFFDF8 0%, #FAF6F0 100%);
      border-radius: 18px;
      padding: 18px 16px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .specialist-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4A84C, #E8C97E);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      font-weight: 700;
      overflow: hidden;
    }
    .specialist-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .specialist-info {
      flex: 1;
      min-width: 0;
    }
    .specialist-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #D4A84C;
      background: rgba(212,168,76,0.12);
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .specialist-name {
      font-size: 15px;
      font-weight: 600;
      color: #3A3530;
      line-height: 1.3;
    }
    .contact-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.22s ease;
      border: none;
      cursor: pointer;
    }
    .contact-btn.phone {
      background: linear-gradient(135deg, #E8D4A8, #D4B87A);
      color: #5A4535;
    }
    .contact-btn.wechat {
      background: #fff;
      color: #5A4535;
      border: 1.5px solid #E0D8CC;
    }
    .contact-btn:active { transform: scale(0.96); }

    /* ===== 服务区标题 ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #5A4535;
    }
    .section-header::before,
    .section-header::after {
      content: '';
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #D8D0C4);
    }
    .section-header::after {
      background: linear-gradient(90deg, #D8D0C4, transparent);
    }
    .section-icon {
      font-size: 17px;
    }

    /* ===== 服务网格 ===== */
    .service-card {
      margin: 0 16px 16px;
      background: #fff;
      border-radius: 18px;
      padding: 20px 12px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }
    .service-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px 8px;
    }
    .service-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      cursor: pointer;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .service-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .service-item:active .service-icon {
      transform: scale(0.92);
    }
    .service-label {
      font-size: 13px;
      font-weight: 600;
      color: #3A3530;
      text-align: center;
      line-height: 1.3;
    }

    /* 图标背景色 */
    .bg-travel     { background: linear-gradient(135deg, #F0DDD0, #E8C8B4); }
    .bg-vpn        { background: linear-gradient(135deg, #D8E8F0, #C0DAEC); }
    .bg-shop       { background: linear-gradient(135deg, #F0E4D0, #E8D4B8); }
    .bg-network    { background: linear-gradient(135deg, #E0DDE8, #CCC8D8); }
    .bg-smart      { background: linear-gradient(135deg, #D8E8DC, #BFD8CA); }
    .bg-kids       { background: linear-gradient(135deg, #F0DFD8, #E8CCC0); }
    .bg-ai         { background: linear-gradient(135deg, #E0E0E8, #CCCCCCD8); }
    .bg-account    { background: linear-gradient(135deg, #E8E0D8, #D8CEC0); }
    .bg-more       { background: linear-gradient(135deg, #EBDFD0, #DDCBA8); }
  </style>
</head>
<body>

  <!-- VIP 卡片 -->

  <!-- 专员卡片 -->
  <div class="specialist-card">

    </div>
    <div class="contact-row">
      <a href="tel:" class="contact-btn phone">

      <a href="#" class="contact-btn wechat" onclick="alert('请通过企业微信搜索「汤松霖」添加');return false;">

      </a>

  <!-- 分割线 + 标题 -->
  <div class="section-header">

  <!-- 服务网格 -->
  <div class="service-card">

      <a class="service-item" href="travel_service.html">

      <a class="service-item" href="vpn_service.html">

      <a class="service-item" href="device_purchase.html">

      <a class="service-item" href="home_network.html">

</body>
</html>
