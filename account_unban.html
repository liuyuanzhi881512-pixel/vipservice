<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>账号解封服务 - 8000VIP服务</title>
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #F0EAE4;
      min-height: 100dvh;
      color: #333;
      overscroll-behavior: none;
      padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
    }

    /* ===== 白卡片容器 ===== */
    .section-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 18px 18px;
      margin: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    /* ===== 产品选择 ===== */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FAF8F5;
      border: 2px solid #E8E2DA;
      border-radius: 14px;
      padding: 22px 12px 18px;
      cursor: pointer;
      transition: all 0.22s ease;
      -webkit-touch-callout: none;
      user-select: none;
      text-align: center;
    }
    .product-card:active { transform: scale(0.97); }
    .product-card.selected {
      border-color: #D4A84C;
      background: #FFFDF5;
      box-shadow: 0 2px 12px rgba(212,168,76,0.15);
    }
    .product-icon {
      font-size: 32px;
      margin-bottom: 10px;
      line-height: 1;
    }
    .product-name {
      font-size: 15px;
      font-weight: 700;
      color: #3A3530;
      line-height: 1.4;
    }
    .product-desc {
      font-size: 12px;
      color: #A09888;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ===== 网格卡片（共用） ===== */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .item-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF8F5;
      border: 2px solid #E8E2DA;
      border-radius: 13px;
      padding: 14px 6px;
      cursor: pointer;
      transition: all 0.22s ease;
      -webkit-touch-callout: none;
      user-select: none;
      text-align: center;
      min-height: 56px;
      overflow: hidden;
    }
    .item-card:active { transform: scale(0.96); }
    .item-card.selected {
      border-color: #D4A84C;
      background: #FFFDF5;
      box-shadow: 0 2px 12px rgba(212,168,76,0.15);
    }
    .item-card .card-text {
      font-size: 13px;
      font-weight: 700;
      color: #3A3530;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-card.selected .card-text {
      color: #D4A84C;
    }
    .item-card.dashed {
      border-style: dashed;
      border-color: #D8D0C4;
    }
    .item-card.dashed .card-text {
      color: #A09888;
      font-weight: 500;
    }

    /* ===== 表单区域 ===== */
    .form-section {
      margin: 4px 16px 24px;
      background: #fff;
      border-radius: 14px;
      padding: 26px 20px;
      box-shadow: 0 1px 8px rgba(60,50,40,0.06);
      border-top: 4px solid #D4A84C;
      padding-bottom: max(26px, env(safe-area-inset-bottom, 26px));
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #77726A;
      margin-bottom: 7px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ===== 文本框 wrapper（承载边框样式 + 浮层引导）===== */
    .textarea-wrapper {
      position: relative;
      padding: 13px 14px;
      border: 1.5px solid #E5DED6;
      border-radius: 10px;
      background: #FAF8F5;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      min-height: 180px;
    }

    .textarea-wrapper:focus-within {
      border-color: #C4B09A;
      box-shadow: 0 0 0 3px rgba(196,176,154,0.12);
      background: #fff;
    }

    .textarea-wrapper textarea {
      width: 100%;
      min-height: 150px;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      font-size: 16px;
      color: #333;
      line-height: 1.6;
      font-family: inherit;
      resize: vertical;
      outline: none;
      display: block;
      position: relative;
      z-index: 2;
      -webkit-appearance: none;
    }

    /* ===== 浮层引导提示 ===== */
    .guide-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 13px 14px;
      pointer-events: none;
      font-size: 13.5px;
      line-height: 1.65;
      color: #C4B09A;
      background: transparent;
      border-radius: 10px;
      overflow: hidden;
      z-index: 1;
      transition: opacity 0.2s ease;
    }
    .guide-overlay.hidden { display: none; }

    /* ===== 提交按钮 ===== */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #3A3D4A 0%, #2D303B 100%);
      color: #D4A84C;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 50px;
      -webkit-tap-highlight-color: transparent;
      margin-top: 4px;
    }
    .submit-btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .submit-btn:hover {
      box-shadow: 0 4px 16px rgba(45,48,59,0.3);
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(45,48,59,0.92);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
      max-width: 80%;
      line-height: 1.5;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* 隐藏区域 */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- 第一步：选择产品 -->
  <div class="section-card" id="step1Card">
    <div class="product-grid">
      <div class="product-card" data-type="company">
        <div class="product-icon">🏢</div>
        <div class="product-name">司内产品账号</div>
        <div class="product-desc">微信、QQ 等</div>
      </div>
      <div class="product-card" data-type="game">
        <div class="product-icon">🎮</div>
        <div class="product-name">游戏账号</div>
        <div class="product-desc">无畏契约、穿越火线等</div>
      </div>
    </div>
  </div>

  <!-- 第二步：选择问题（初始隐藏） -->
  <div class="section-card hidden" id="step2Card">
    <!-- 司内产品问题 -->
    <div class="hidden" id="companyQuestions">
      <div class="item-grid">
        <div class="item-card" data-question="账号被封禁，无法正常登录" data-placeholder="例如：账号是___（微信号/QQ号），提示「账号异常被限制登录」|例如：大概是___（昨天/今早）开始登不上的，之前有没有收到异地登录提醒|例如：是否有绑定的手机号/好友辅助验证可用于申诉解封">
          <span class="card-text">账号封禁登录</span>
        </div>
        <div class="item-card" data-question="账号部分功能被限制使用" data-placeholder="例如：被限制的功能是___（发消息/加好友/朋友圈/支付）|例如：限制提示为___，已持续约___天|例如：是否刚发过大量消息/加过很多好友/被多人举报">
          <span class="card-text">功能限制使用</span>
        </div>
        <div class="item-card" data-question="忘记了登录密码" data-placeholder="例如：账号是___，绑定的手机号/邮箱还能收到验证码吗|例如：有没有开启声音锁/好友辅助验证|例如：大概多久没登录了，记得注册时的密保信息吗">
          <span class="card-text">忘记登录密码</span>
        </div>
      </div>
    </div>

    <!-- 游戏账号问题 -->
    <div class="hidden" id="gameQuestions">
      <div class="item-grid">
        <div class="item-card" data-question="游戏账号被封禁" data-placeholder="例如：游戏是___（无畏契约/穿越火线），大区/服务器是___|例如：封禁提示是___，封禁时长___（永久/7天/30天）|例如：是否收到过违规警告，大概因为___（外挂/代练/言语违规）">
          <span class="card-text">账号封禁</span>
        </div>
        <div class="item-card" data-question="游戏账号被盗" data-placeholder="例如：游戏是___，角色名/ID 是___|例如：发现被盗时___（道具/点券/装备）少了，最近一次正常登录是___|例如：现在还能正常登录，还是已被改密无法进入">
          <span class="card-text">账号被盗</span>
        </div>
        <div class="item-card" data-question="忘记了游戏登录密码" data-placeholder="例如：游戏是___，绑定的手机号/邮箱还能用吗|例如：是否记得注册时的密保问题|例如：有没有绑定微信/QQ 快捷登录可找回">
          <span class="card-text">忘记密码</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 表单区 -->
  <section class="form-section" id="formSection">
    <form id="applyForm">
      <div class="form-group">
        <label for="description">描述您的需求 *</label>
        <div class="textarea-wrapper">
          <textarea id="description" name="description" required></textarea>
          <div class="guide-overlay" id="guideOverlay">👆 点击上方问题卡片，或直接描述您的需求</div>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">通知专员</button>
    </form>
  </section>

  <div class="toast" id="toast"></div>

<script>
    const SCF_FUNCTION_URL = 'https://1257899736-jbihimkpfb.ap-guangzhou.tencentcf.com';
    const WEBHOOK_KEY = '257abe2d-532e-4a31-a456-1f1c7bce544d';

    let selectedProduct = null;   // 'company' | 'game'
    let selectedQuestion = null;
    let selectedGame = null;

    // ===== 浮层引导相关 =====
    const descField = document.getElementById('description');
    const guideOverlay = document.getElementById('guideOverlay');

    descField.addEventListener('focus', () => {
      guideOverlay.classList.add('hidden');
    });
    descField.addEventListener('input', () => {
      guideOverlay.classList.add('hidden');
    });
    descField.addEventListener('blur', () => {
      if (!descField.value.trim()) {
        guideOverlay.classList.remove('hidden');
      }
    });

    // 显示浮层引导（非实体），点击问题卡片时触发
    function showGuide(card) {
      const q = card.dataset.question;
      const placeholder = card.dataset.placeholder || '';
      if (!q) return;

      selectedQuestion = q;

      const guideHtml = placeholder.replace(/\|/g, '<br>');
      guideOverlay.innerHTML = '<strong style="color:#D4A84C;">' + q + '</strong><br><br>' + guideHtml;
      guideOverlay.classList.remove('hidden');
      descField.value = '';

      document.getElementById('formSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ===== 第一步：产品选择 =====
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', () => {
        // 选中状态
        document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        selectedProduct = card.dataset.type;

        // 显示第二步
        document.getElementById('step2Card').classList.remove('hidden');

        // 显示对应问题
        document.getElementById('companyQuestions').classList.add('hidden');
        document.getElementById('gameQuestions').classList.add('hidden');
        if (selectedProduct === 'company') {
          document.getElementById('companyQuestions').classList.remove('hidden');
        } else {
          document.getElementById('gameQuestions').classList.remove('hidden');
        }

        // 滚动到第二步
        setTimeout(() => {
          document.getElementById('step2Card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      });
    });

    // ===== 第二步：问题卡片点击（司内产品）=====
    document.querySelectorAll('#companyQuestions .item-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('#companyQuestions .item-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        showGuide(card);
      });
    });

    // ===== 第二步：问题/游戏卡片点击（游戏）=====
    document.querySelectorAll('#gameQuestions .item-card').forEach(card => {
      card.addEventListener('click', () => {
        if (card.classList.contains('dashed')) return;

        const hasGame = card.dataset.game;
        const hasQuestion = card.dataset.question;

        if (hasQuestion) {
          // 问题卡片
          document.querySelectorAll('#gameQuestions .item-card').forEach(c => {
            if (!c.classList.contains('dashed')) c.classList.remove('selected');
          });
          card.classList.add('selected');
          showGuide(card);
        } else if (hasGame) {
          // 游戏卡片（可多选）
          const wasSelected = card.classList.contains('selected');
          if (!wasSelected) {
            card.classList.add('selected');
            selectedGame = hasGame;
          } else {
            card.classList.remove('selected');
            selectedGame = null;
          }
          // 更新描述框
          scrollToForm();
        }
      });
    });

    function scrollToForm() {
      setTimeout(() => {
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('description').focus();
      }, 200);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ===== 表单提交 =====
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const desc = document.getElementById('description').value.trim();

      if (!desc) { showToast('请描述您的需求'); return; }

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '通知中...';

      try {
        const timeStr = new Date().toLocaleString('zh-CN');
        const productLine = selectedProduct === 'company' ? '\n> **产品类型：**司内产品' : '\n> **产品类型：**游戏产品';
        const qLine = selectedQuestion ? '\n> **选中问题：**' + selectedQuestion.replace(/[？?。]+$/, '') : '';

        let games = [];
        document.querySelectorAll('#gameQuestions .item-card.selected').forEach(c => {
          if (c.dataset.game) games.push(c.dataset.game);
        });
        const gLine = games.length > 0 ? '\n> **涉及游戏：**' + games.join('、') : '';

        const message = {
          msgtype: 'markdown',
          markdown: {
            content:
              '**🔓 账号解封新需求**\n\n' +
              productLine +
              qLine +
              gLine +
              '\n> **需求描述：**\n> ' + desc.replace(/\n/g, '\n> ') + '\n' +
              '> **时间：**' + timeStr + '\n\n---\n' +
              '<font color="info">8000VIP 账号解封服务</font>'
          }
        };

        const resp = await fetch(SCF_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(message)
        });

        const result = await resp.json();
        if (result.errcode === 0) {
          showToast('✅ 提交成功！专员会尽快联系您');
          document.getElementById('applyForm').reset();
          guideOverlay.innerHTML = '👆 点击上方问题卡片，或直接描述您的需求';
          guideOverlay.classList.remove('hidden');
          selectedProduct = null;
          selectedQuestion = null;
          selectedGame = null;
          document.querySelectorAll('.item-card, .product-card').forEach(c => c.classList.remove('selected'));
          // 回到第一步
          document.getElementById('step2Card').classList.add('hidden');
        } else {
          showToast('提交失败：' + (result.errmsg || '未知错误'));
        }
      } catch (err) {
        console.error(err);
        showToast('❌ 提交失败，请稍后重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '通知专员';
      }
    });
  </script>

</body>
</html>
