<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>子女学习服务 - 8000VIP服务</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #F0EAE4;
      min-height: 100dvh;
      color: #333;
      overscroll-behavior: none;
    }

    /* ===== Hero 标题区（深色+金色）===== */
    .hero {
      background: linear-gradient(145deg, #2D303B 0%, #3A3D4A 50%, #2D303B 100%);
      margin: 16px 16px 0;
      padding: 40px 24px 36px;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(45,48,59,0.35);
      text-align: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -30px;
      width: 140px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(200,170,110,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: 28px;
      width: 6px;
      height: 6px;
      background: rgba(218,180,90,0.6);
      border-radius: 50%;
      box-shadow:
        22px -14px 0 1px rgba(218,180,90,0.35),
        52px 6px 0 1px rgba(218,180,90,0.25),
        80px -8px 0 1px rgba(218,180,90,0.2);
      pointer-events: none;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 2px;
      line-height: 1.5;
      color: #D4A84C;
      position: relative;
      z-index: 1;
    }

    .hero-desc {
      font-size: 15px;
      color: rgba(212,168,76,0.7);
      margin-top: 10px;
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* ===== 开放式提示条 ===== */
    .open-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      margin: 16px 16px 10px;
      background: linear-gradient(135deg, rgba(212,168,76,0.08) 0%, rgba(196,176,154,0.1) 100%);
      border-radius: 10px;
      border: 1px solid rgba(196,176,154,0.25);
    }

    .open-hint-icon { font-size: 17px; flex-shrink: 0; }

    .open-hint-text {
      font-size: 13px;
      color: #8B7355;
      line-height: 1.55;
      text-align: center;
    }
    .open-hint-text strong { color: #9B8565; font-weight: 600; }

    /* ===== 问题区域（图标网格）===== */
    .qa-section { padding: 4px 14px 8px; }

    .qa-group { margin-bottom: 6px; }

    .qa-group-title {
      font-size: 15px;
      color: #5A5045;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      border-radius: 10px;
      transition: all 0.2s ease;
      background: #fff;
      border: 1.5px solid #E8E2DA;
      box-shadow: 0 1px 4px rgba(60,50,40,0.04);
    }

    .qa-group-title:active {
      background: #FAF6F0;
      border-color: #C4B09A;
      transform: scale(0.98);
    }

    @media (hover: hover) {
      .qa-group-title:hover {
        background: #FBF8F4;
        border-color: #D0C4B8;
        box-shadow: 0 2px 8px rgba(60,50,40,0.07);
      }
    }

    .qa-group-title span:first-child {
      font-weight: 400;
      color: #A89880;
      font-size: 12px;
    }

    .qa-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      font-size: 13px;
      color: #C4B09A;
      background: #F7F2EC;
      border-radius: 6px;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      margin-left: auto;
      line-height: 1;
    }

    .qa-group.collapsed .qa-arrow {
      transform: rotate(-90deg);
    }

    .qa-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.25s ease,
                  margin 0.25s ease;
      max-height: 500px;
      opacity: 1;
    }

    .qa-group.collapsed .qa-grid {
      max-height: 0 !important;
      opacity: 0;
      margin-top: 0;
      margin-bottom: 0;
    }

    .qa-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #fff;
      border: 1.5px solid #E8E2DA;
      border-radius: 11px;
      padding: 10px 6px 8px;
      cursor: pointer;
      transition: all 0.22s ease;
      min-height: 56px;
      -webkit-touch-callout: none;
      user-select: none;
      text-align: center;
    }

    .qa-card-icon {
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
    }

    .qa-card-text {
      font-size: 12.5px;
      color: #3A3530;
      font-weight: 700;
      line-height: 1.35;
    }

    .qa-card-text sub {
      display: block;
      font-size: 10px;
      color: #999;
      font-weight: 400;
      margin-top: 1px;
    }

    .qa-card:active {
      background: #FAF6F0;
      border-color: #C4B09A;
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .qa-card:hover {
        background: #FBF8F4;
        border-color: #C4B09A;
        transform: translateY(-1px);
        box-shadow: 0 3px 12px rgba(60,50,40,0.08);
      }
    }

    /* ===== 表单区域（视觉焦点）===== */
    .form-section {
      margin: 8px 16px 24px;
      background: #fff;
      border-radius: 14px;
      padding: 26px 20px;
      box-shadow: 0 4px 20px rgba(60,50,40,0.1);
      border: 1.5px solid rgba(196,176,154,0.5);
      position: relative;
      overflow: hidden;
      padding-bottom: max(26px, env(safe-area-inset-bottom, 26px));
    }

    .form-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #D4A84C, #C4B09A);
    }

    .form-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .form-header h2 {
      font-size: 18px;
      color: #8B7355;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .form-header p {
      font-size: 12px;
      color: #AAA499;
      margin-top: 6px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #77726A;
      margin-bottom: 7px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 15px;
      border: 1.5px solid #E5DED6;
      border-radius: 10px;
      font-size: 16px;
      color: #333;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      outline: none;
      font-family: inherit;
      background: #FAF8F5;
      -webkit-appearance: none;
    }

    .form-group input:focus {
      border-color: #C4B09A;
      box-shadow: 0 0 0 3px rgba(196,176,154,0.12);
      background: #fff;
    }

    /* ===== 文本框浮层引导（非实体）===== */
    .textarea-wrapper {
      position: relative;
      padding: 13px 15px;
      border: 1.5px solid #E5DED6;
      border-radius: 10px;
      background: #FAF8F5;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      min-height: 160px;
    }

    .textarea-wrapper:focus-within {
      border-color: #C4B09A;
      box-shadow: 0 0 0 3px rgba(196,176,154,0.12);
      background: #fff;
    }

    .textarea-wrapper textarea {
      width: 100%;
      min-height: 130px;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      font-size: 16px;
      color: #333;
      line-height: 1.65;
      font-family: inherit;
      resize: vertical;
      outline: none;
      display: block;
      position: relative;
      z-index: 2;
      -webkit-appearance: none;
    }

    .guide-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 13px 15px;
      pointer-events: none;
      font-size: 14px;
      line-height: 1.6;
      color: #B0A698;
      background: transparent;
      border-radius: 10px;
      overflow: hidden;
      z-index: 1;
      transition: opacity 0.2s ease;
    }

    .guide-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #3A3D4A 0%, #2D303B 100%);
      color: #D4A84C;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 2px;
      min-height: 50px;
      -webkit-tap-highlight-color: transparent;
      margin-top: 4px;
    }

    .submit-btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .submit-btn:hover {
      box-shadow: 0 4px 16px rgba(45,48,59,0.3);
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      top: max(20px, env(safe-area-inset-top, 20px));
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.68,-0.55,0.265,1.55);
      white-space: nowrap;
      max-width: calc(100vw - 40px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { color: #52c41a; border-left: 4px solid #52c41a; }
    .toast.error { color: #ff4d4f; border-left: 4px solid #ff4d4f; }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 8px 20px max(20px, env(safe-area-inset-bottom, 20px));
      color: #BBB5AA;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    /* ===== 桌面端 ===== */
    @media (min-width: 768px) {
      .page-wrap { max-width: 520px; margin: 0 auto; }
      .hero { margin: 24px auto 0; }
      .hero-title { font-size: 30px; }
      .qa-grid { gap: 9px; }
      .qa-card { padding: 12px 8px 10px; min-height: 62px; border-radius: 12px; }
      .qa-card-icon { font-size: 22px; }
      .qa-card-text { font-size: 13.5px; }
      .qa-card-text sub { font-size: 10.5px; }
    }

    /* ===== iPhone SE / 小屏 ===== */
    @media (max-width: 374px) {
      .hero { margin: 12px 10px 0; padding: 30px 18px 28px; }
      .hero-title { font-size: 22px; letter-spacing: 1.5px; }
      .hero-desc { font-size: 13px; }
      .open-hint { margin: 14px 10px 8px; padding: 11px 12px; }
      .open-hint-text { font-size: 12px; }
      .qa-section { padding: 2px 8px 6px; }
      .qa-grid { gap: 5px; }
      .qa-card { padding: 8px 4px 6px; min-height: 50px; border-radius: 10px; }
      .qa-card-icon { font-size: 18px; }
      .qa-card-text { font-size: 11.5px; }
      .qa-card-text sub { font-size: 9px; }
      .qa-group-title { font-size: 14px; padding: 10px 12px; }
      .form-section { margin: 4px 10px 20px; padding: 22px 16px; }
    }

    /* ===== 大屏手机 ===== */
    @media (min-width: 390px) and (max-width: 767px) {
      .hero-title { font-size: 28px; }
    }

    /* ===== 横屏 ===== */
    @media (max-height: 500px) and (orientation: landscape) {
      .hero { margin: 8px 12px 0; padding: 22px 20px 18px; }
      .hero-title { font-size: 20px; }
      .hero-desc { display: none; }
      .open-hint { margin: 10px 12px 6px; padding: 8px 12px; }
      .qa-group { margin-bottom: 4px; }
      .qa-group-title { padding: 8px 12px; font-size: 14px; }
      .qa-grid { gap: 5px; grid-template-columns: repeat(3, 1fr); }
      .qa-card { padding: 6px 4px 5px; min-height: 44px; border-radius: 9px; }
      .qa-card-icon { font-size: 17px; }
      .qa-card-text { font-size: 11px; }
      .qa-card-text sub { display: none; }
      .form-section { margin-bottom: 10px; padding: 18px 16px; }
    }

    input[type="text"], textarea { -webkit-appearance: none; }
  </style>
</head>

  <script>
    // SCF 函数地址（部署后替换）
    const WEBHOOK_URL = 'https://1257899736-i97z1szf8z.ap-guangzhou.tencentcf.com';

    // iOS 100vh fix
    function fixViewportHeight() {
      document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    }
    fixViewportHeight();
    window.addEventListener('resize', fixViewportHeight);
    window.addEventListener('orientationchange', () => setTimeout(fixViewportHeight, 300));

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const descField = document.getElementById('description');
    const guideOverlay = document.getElementById('guideOverlay');

    // 浮层显隐控制：文本框为空且未聚焦时显示引导
    function updateGuideVisibility() {
      if (descField.value.trim() === '' && document.activeElement !== descField) {
        guideOverlay.classList.remove('hidden');
      } else {
        guideOverlay.classList.add('hidden');
      }
    }

    descField.addEventListener('focus', () => guideOverlay.classList.add('hidden'));
    descField.addEventListener('input', () => guideOverlay.classList.add('hidden'));
    descField.addEventListener('blur', updateGuideVisibility);

    // 表单提交
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const desc = document.getElementById('description').value.trim();

      if (!desc) {
        showToast('请描述您的需求', 'error');
        return;
      }
      if (!WEBHOOK_URL) {
        showToast('服务尚未就绪，请联系管理员', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = '通知中...';

      try {
        const timeStr = new Date().toLocaleString('zh-CN');
        const message = {
          msgtype: 'markdown',
          markdown: {
            content:
              '**📚 子女学习新咨询**\n\n' +
              '> **时间：**' + timeStr + '\n' +
              '> **描述：**\n> ' + desc.replace(/\n/g, '\n> ') + '\n\n' +
              '---\n' +
              '<font color="info">8000VIP 子女学习服务</font>'
          }
        };

        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(message)
        });
        const result = await res.json();

        if (result.errcode === 0 || result.errno === 0) {
          showToast('✅ 提交成功！专员会尽快联系您');
          document.getElementById('applyForm').reset();
          updateGuideVisibility();
        } else {
          showToast(result.errmsg || '提交失败，请稍后重试', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('网络错误，请检查连接后重试', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '通知专员';
      }
    });

    // 折叠分组：点击标题切换展开/收起
    document.querySelectorAll('.qa-group-title').forEach(title => {
      title.addEventListener('click', () => {
        const group = title.parentElement;
        const grid = group.querySelector('.qa-grid');
        const wasCollapsed = group.classList.contains('collapsed');

        if (wasCollapsed) {
          group.classList.remove('collapsed');
          grid.style.maxHeight = grid.scrollHeight + 'px';
          setTimeout(() => { grid.style.maxHeight = ''; }, 360);
        } else {
          grid.style.maxHeight = grid.scrollHeight + 'px';
          requestAnimationFrame(() => {
            group.classList.add('collapsed');
            grid.style.maxHeight = '';
          });
        }
      });
    });

    // 卡片点击 → 显示对应浮层引导（非实体，用户一点就消失）
    document.querySelectorAll('.qa-card').forEach(card => {
      card.addEventListener('click', () => {
        const textEl = card.querySelector('.qa-card-text');
        const mainTitle = textEl.childNodes[0].textContent.trim();
        const placeholder = card.dataset.placeholder || '';
        const guideHtml = placeholder.replace(/\|/g, '<br>');

        guideOverlay.innerHTML = '<strong style="color:#D4A84C;">' + mainTitle + '</strong><br><br>' + guideHtml;
        guideOverlay.classList.remove('hidden');
        descField.value = '';
        document.getElementById('formSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });
  </script>
</body>
</html>
